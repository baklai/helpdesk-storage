    <link rel="icon" type="image/svg+xml" href="/_internal_theme/favicon.svg" />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background-color: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px 0;
      }

      .container {
        max-width: 80%;
        height: 90vh;
        background: white;
        padding: 0;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header-static {
        padding: 30px 30px 10px 30px;
        flex-shrink: 0;
      }

      #file-list-container {
        flex-grow: 1;
        overflow-y: auto;

      }

      h1 {
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
      }
      h1 i {

        color: #3498db;
      }

      pre {
        font-family:
          'Segoe UI',
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 1rem;
        background: transparent;
        padding: 0;
      }
      a {
        text-decoration: none;
        color: #34495e;
        font-weight: 500;
        transition: color 0.2s;
      }
      a:hover {
        color: #3498db;
        text-decoration: underline;
      }

      hr {
        border-top: 2px solid #eee;
        margin: 20px 0;
      }

      .file-icon {
        width: 25px;
        display: inline-block;
        text-align: center;
        margin-right: 10px;
        color: #7f8c8d;
      }
    </style>
