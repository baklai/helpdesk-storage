<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Helpdesk Storage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        color: #333;
        padding-top: 50px;
      }
      .container {
        max-width: 900px;
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }
      h1 {
        font-weight: 700;
        color: #2c3e50;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
      }
      h1 i {
        margin-right: 15px;
        color: #3498db;
      }

      pre {
        font-family:
          'Segoe UI',
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 1rem;
        background: transparent;
        padding: 0;
      }
      a {
        text-decoration: none;
        color: #34495e;
        font-weight: 500;
        transition: color 0.2s;
      }
      a:hover {
        color: #3498db;
        text-decoration: underline;
      }

      hr {
        border-top: 2px solid #eee;
        margin: 20px 0;
      }

      .file-icon {
        width: 25px;
        display: inline-block;
        text-align: center;
        margin-right: 10px;
        color: #7f8c8d;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1><i class="fas fa-folder-open"></i> File Storage</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/app/">Home</a></li>
          <li class="breadcrumb-item active">Storage</li>
        </ol>
      </nav>
      <hr />
