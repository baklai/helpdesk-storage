server {
    listen 80;
    server_name localhost;
    charset utf-8;

    location / {
        root /usr/share/nginx/html/files;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        add_before_body /_internal_theme/header.html;
        add_after_body  /_internal_theme/footer.html;
    }

    location /_internal_theme/ {
        alias /etc/nginx/theme/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /webfonts/ {
        alias /etc/nginx/theme/webfonts/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin *;
    }
}