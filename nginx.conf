server {
    listen 80;
    server_name localhost;
    charset utf-8;

    location /storage/ {
        root /usr/share/nginx/html/files;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        add_before_body /storage/_internal_theme/header.html;
        add_after_body  /storage/_internal_theme/footer.html;
    }

    location /storage/_internal_theme/ {
        alias /etc/nginx/theme/;
        expires 7d;
        add_header Cache-Control "public";
    }
}