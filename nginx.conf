server {
    listen 80;
    server_name localhost;
    charset utf-8;

    location / {
        root /usr/share/nginx/html/files;
        
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;

        add_before_body /.theme/header.html;
        add_after_body  /.theme/footer.html;
    }

    location /.theme/ {
        root /usr/share/nginx/html/files;
    }
}